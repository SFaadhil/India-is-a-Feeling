name: Sync AIESEC Opportunities

on:
  schedule:
    # 5:30 AM IST = 00:00 UTC daily
    - cron: '0 0 * * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    name: Fetch & upsert opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        run: npm install
        working-directory: sync

      - name: Run sync
        run: node sync.js
        working-directory: sync
        env:
          AIESEC_TOKEN:        ${{ secrets.AIESEC_TOKEN }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          INDIA_MC_ID:         ${{ secrets.INDIA_MC_ID }}
