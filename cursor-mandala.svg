<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Marquise petal: inner tip reaches past center so the 8 copies interlock -->
    <path id="petal" d="M16 19.5 C 11.8 16, 11.8 7.5, 16 3.5 C 20.2 7.5, 20.2 16, 16 19.5 Z"
          fill="none" stroke="#9A031E" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Small bracket tip peeking out between petals -->
    <polyline id="tip" points="13.7,6 13.7,4.4 16,2.7 18.3,4.4 18.3,6"
              fill="none" stroke="#9A031E" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
  </defs>
  <use href="#petal"/>
  <use href="#petal" transform="rotate(45 16 16)"/>
  <use href="#petal" transform="rotate(90 16 16)"/>
  <use href="#petal" transform="rotate(135 16 16)"/>
  <use href="#petal" transform="rotate(180 16 16)"/>
  <use href="#petal" transform="rotate(225 16 16)"/>
  <use href="#petal" transform="rotate(270 16 16)"/>
  <use href="#petal" transform="rotate(315 16 16)"/>
  <use href="#tip" transform="rotate(22.5 16 16)"/>
  <use href="#tip" transform="rotate(67.5 16 16)"/>
  <use href="#tip" transform="rotate(112.5 16 16)"/>
  <use href="#tip" transform="rotate(157.5 16 16)"/>
  <use href="#tip" transform="rotate(202.5 16 16)"/>
  <use href="#tip" transform="rotate(247.5 16 16)"/>
  <use href="#tip" transform="rotate(292.5 16 16)"/>
  <use href="#tip" transform="rotate(337.5 16 16)"/>
</svg>
