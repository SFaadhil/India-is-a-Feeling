<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="cg" gradientUnits="userSpaceOnUse" cx="16" cy="16" r="14">
      <stop offset="0%"   stop-color="#FF8C14"/>
      <stop offset="26%"  stop-color="#E84850"/>
      <stop offset="60%"  stop-color="#BE1030"/>
      <stop offset="100%" stop-color="#6E0010"/>
    </radialGradient>

    <!-- Main outer petal -->
    <path id="p"
      d="M16,16 C 10,13.5 9.5,6 16,2 C 22.5,6 22,13.5 16,16 Z"
      fill="url(#cg)"/>

    <!-- Small petal between main ones (renders behind, peeks through gaps) -->
    <path id="bp"
      d="M16,16 C 14,15 13.5,11.5 16,9.5 C 18.5,11.5 18,15 16,16 Z"
      fill="url(#cg)" opacity="0.62"/>

    <!-- Inner echo: same petal curve shape, stroke only — the mandala contour line -->
    <path id="echo"
      d="M16,16 C 11.8,14.2 11.5,7.8 16,4.8 C 20.5,7.8 20.2,14.2 16,16 Z"
      fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.32" stroke-linejoin="round"/>

    <!-- Small almond/eye near each petal tip — mandala inner ornament -->
    <path id="eye"
      d="M16,4.2 C 15.1,5.4 15.1,7.2 16,8.4 C 16.9,7.2 16.9,5.4 16,4.2 Z"
      fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="0.3" stroke-linejoin="round"/>
  </defs>

  <!-- 8 small between-petal shapes (drawn first so main petals layer over them) -->
  <use href="#bp" transform="rotate(22.5  16 16)"/>
  <use href="#bp" transform="rotate(67.5  16 16)"/>
  <use href="#bp" transform="rotate(112.5 16 16)"/>
  <use href="#bp" transform="rotate(157.5 16 16)"/>
  <use href="#bp" transform="rotate(202.5 16 16)"/>
  <use href="#bp" transform="rotate(247.5 16 16)"/>
  <use href="#bp" transform="rotate(292.5 16 16)"/>
  <use href="#bp" transform="rotate(337.5 16 16)"/>

  <!-- 8 main petals -->
  <use href="#p"/>
  <use href="#p" transform="rotate(45  16 16)"/>
  <use href="#p" transform="rotate(90  16 16)"/>
  <use href="#p" transform="rotate(135 16 16)"/>
  <use href="#p" transform="rotate(180 16 16)"/>
  <use href="#p" transform="rotate(225 16 16)"/>
  <use href="#p" transform="rotate(270 16 16)"/>
  <use href="#p" transform="rotate(315 16 16)"/>

  <!-- Inner echo contour strokes on each main petal -->
  <use href="#echo"/>
  <use href="#echo" transform="rotate(45  16 16)"/>
  <use href="#echo" transform="rotate(90  16 16)"/>
  <use href="#echo" transform="rotate(135 16 16)"/>
  <use href="#echo" transform="rotate(180 16 16)"/>
  <use href="#echo" transform="rotate(225 16 16)"/>
  <use href="#echo" transform="rotate(270 16 16)"/>
  <use href="#echo" transform="rotate(315 16 16)"/>

  <!-- Almond ornament at each petal tip -->
  <use href="#eye"/>
  <use href="#eye" transform="rotate(45  16 16)"/>
  <use href="#eye" transform="rotate(90  16 16)"/>
  <use href="#eye" transform="rotate(135 16 16)"/>
  <use href="#eye" transform="rotate(180 16 16)"/>
  <use href="#eye" transform="rotate(225 16 16)"/>
  <use href="#eye" transform="rotate(270 16 16)"/>
  <use href="#eye" transform="rotate(315 16 16)"/>

  <!-- Center disc -->
  <circle cx="16" cy="16" r="3.5" fill="url(#cg)"/>
  <!-- Center highlight -->
  <circle cx="16" cy="16" r="1.5" fill="#FFD080" opacity="0.9"/>
</svg>
